[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.bcmath"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "php artisan view:cache"
]

[start]
cmd = "if [ -z \"$APP_KEY\" ]; then export APP_KEY=$(php artisan key:generate --show); fi && php artisan config:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
